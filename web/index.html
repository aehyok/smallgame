<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Tank Battle · Preview</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #050810;
        color: #e8eef7;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 16px;
      }
      canvas {
        max-height: 92vh;
        width: auto;
        image-rendering: pixelated;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        border: 1px solid #222a40;
      }
      .bar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      button,
      input {
        font: inherit;
        background: #1a2238;
        color: #e8eef7;
        border: 1px solid #2c3a5a;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #243054;
      }
      label {
        opacity: 0.8;
        font-size: 13px;
      }
      input[type="number"] {
        width: 90px;
      }
      select {
        font: inherit;
        background: #1a2238;
        color: #e8eef7;
        border: 1px solid #2c3a5a;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
      }
      #info {
        font-size: 13px;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="bar">
        <label
          >game
          <select id="game"></select>
        </label>
        <label
          >seed
          <input id="seed" type="number" value="1" />
        </label>
        <button id="restart">restart</button>
        <button id="next">next seed →</button>
        <span id="info"></span>
      </div>
      <canvas id="stage" width="720" height="1280"></canvas>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
